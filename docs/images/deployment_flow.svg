  <text x="550" y="550" text-anchor="middle" fill="#2c3e50" font-size="10">SV_BRAND_ANALYTICS</text>
  <text x="550" y="565" text-anchor="middle" fill="#2c3e50" font-size="10">SV_REVENUE_GROWTH</text>
